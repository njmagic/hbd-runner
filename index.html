<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Scroller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="sketch.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-color: #000;
        }
        
        /* Touch controls overlay - only visible on mobile */
        #mobileControls {
            display: none; /* Only shown when needed */
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            padding: 0;
            z-index: 9998;
            pointer-events: none;
            
            /* Additional properties to prevent flickering */
            -webkit-backface-visibility: hidden;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            will-change: opacity, transform;
            opacity: 1;
            transition: opacity 0.1s ease;
        }
        
        /* Individual mobile buttons */
        .mobile-button {
            pointer-events: auto;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            border-radius: 50%;
            display: inline-block;
            margin: 0 10px;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
            
            /* Additional properties to prevent rendering issues */
            -webkit-backface-visibility: hidden;
            -webkit-transform: translateZ(0);
            transform: translateZ(0);
            will-change: transform;
            transition: transform 0.1s ease;
            user-select: none;
        }
        
        /* Active state for touch feedback */
        .mobile-button:active {
            transform: scale(0.95);
            background-color: rgba(255, 255, 255, 0.3);
        }
        
        #jumpButton {
            width: 80px;
            height: 80px;
            line-height: 80px;
            position: fixed;
            left: 40px;
            bottom: 30px;
        }
        
        #shootButton {
            width: 80px;
            height: 80px;
            line-height: 80px;
            position: fixed;
            right: 40px;
            bottom: 30px;
        }
        
        /* Mobile leaderboard submit button - only shows on game over */
        #submitLeaderboardBtn {
            font-family: 'Courier New', monospace;
            font-weight: bold; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            display: none; 
            position: fixed !important; 
            top: 50% !important; 
            left: 50% !important; 
            transform: translate(-50%, -50%) !important; 
            z-index: 999999 !important; 
            width: 300px !important; 
            height: 100px !important; 
            line-height: 100px !important; 
            background-color: rgba(220, 40, 40, 0.95) !important; 
            border: 5px solid rgba(255, 255, 255, 0.95) !important; 
            font-size: 26px !important;
            text-align: center !important;
        }
        
        /* Mobile specific styles */
        @media (max-width: 768px) {
            html, body {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
                background-color: #000;
            }
            
            canvas {
                max-width: 100% !important;
                max-height: 100% !important;
                width: auto !important;
                height: auto !important;
                position: absolute !important;
                top: 50% !important;
                left: 50% !important;
                transform: translate(-50%, -50%) !important;
                display: block !important;
                visibility: visible !important;
                touch-action: auto !important;
                pointer-events: auto !important;
            }
            
            main {
                width: 100% !important;
                height: 100% !important;
                display: flex !important;
                justify-content: center !important;
                align-items: center !important;
                position: relative !important;
            }
        }
        
        /* Mobile START GAME button above canvas */
        #mobile-canvas-start-button {
            display: none; /* Hidden by default - only shown on mobile via script */
            visibility: hidden;
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 60px;
            line-height: 60px;
            background-color: #ff0000;
            color: white;
            font-size: 22px;
            font-family: 'Arial', sans-serif;
            font-weight: bold;
            text-align: center;
            border-radius: 10px;
            border: 5px solid white;
            z-index: 999999;
            text-transform: uppercase;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.7);
            pointer-events: auto;
            -webkit-tap-highlight-color: transparent;
            animation: pulse 1.5s infinite alternate;
        }
        
        @keyframes pulse {
            0% { transform: translateX(-50%) scale(1); box-shadow: 0 0 20px rgba(255, 0, 0, 0.7); }
            100% { transform: translateX(-50%) scale(1.05); box-shadow: 0 0 40px rgba(255, 0, 0, 0.9); }
        }
    </style>
    
    <script>
        // Make supabase client available globally for the mobile integration
        window.supabaseClient = null;
        
        // Global tracking for button state to prevent glitching
        window.mobileButtonsShown = false;
        window.gameStarted = false;
        
        // STRICT DEVICE DETECTION - Guaranteed not to affect desktop
        function isMobileDevice() {
            return /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                   (window.matchMedia && window.matchMedia("(max-width: 768px)").matches) ||
                   ('ontouchstart' in window) ||
                   (navigator.maxTouchPoints > 0);
        }
        
        // Only run mobile code if this is a mobile device
        if (isMobileDevice()) {
            document.addEventListener('DOMContentLoaded', function() {
                // Initialize Supabase client and store it on window
                const supabaseUrl = 'https://pvpwmikhzzvtcafhtidh.supabase.co';
                const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2cHdtaWtoenp2dGNhZmh0aWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTM1NDA5MDAsImV4cCI6MjAyOTExNjkwMH0.o71bhbTBK_2FHlJYFrELCngtaLWYtFjuXjiN7SuSHW4';
                window.supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
                
                console.log("Mobile device detected - setting up mobile environment");
                setupMobileEnvironment();
                
                // Add canvas activation after a short delay
                setTimeout(activateCanvas, 1000);
                
                // Setup P5 animation
                setTimeout(ensureP5Animation, 800);
                
                // Center canvas
                setTimeout(centerCanvasForMobile, 500);
                
                // Setup state monitor
                setupMobileStateMonitor();
            });
        } else {
            console.log("Desktop detected - no mobile code will run");
            
            // Hide mobile elements on desktop
            document.addEventListener('DOMContentLoaded', function() {
                // Hide the START GAME button on desktop
                const startButton = document.getElementById('mobile-canvas-start-button');
                if (startButton) {
                    startButton.style.display = 'none';
                    startButton.style.visibility = 'hidden';
                }
                
                // Hide mobile controls on desktop
                const mobileControls = document.getElementById('mobileControls');
                if (mobileControls) {
                    mobileControls.style.display = 'none';
                    mobileControls.style.visibility = 'hidden';
                }
            });
        }
        
        // Set up the mobile environment cleanly
        function setupMobileEnvironment() {
            if (!isMobileDevice()) return; // Safety check
            
            // Show only the START GAME button initially
            const startButton = document.getElementById('mobile-canvas-start-button');
            if (startButton) {
                startButton.style.display = 'block';
                startButton.style.visibility = 'visible';
            }
            
            // Make sure the original button is hidden
            const middleButton = document.getElementById('mobile-start-button');
            if (middleButton) {
                middleButton.style.display = 'none';
                middleButton.style.visibility = 'hidden';
            }
            
            // Keep controls hidden initially
            const mobileControls = document.getElementById('mobileControls');
            if (mobileControls) {
                mobileControls.style.display = 'none';
                mobileControls.style.visibility = 'hidden';
            }
        }
        
        // Setup mobile state monitor
        function setupMobileStateMonitor() {
            if (!isMobileDevice()) return; // Safety check
            
            setInterval(function() {
                // Game over state
                if (window.gameState === "gameOver") {
                    // Hide controls
                    const mobileControls = document.getElementById('mobileControls');
                    if (mobileControls) {
                        mobileControls.style.display = 'none';
                        mobileControls.style.visibility = 'hidden';
                    }
                    
                    // Show submission button
                    const leaderboardBtn = document.getElementById('submitLeaderboardBtn');
                    if (leaderboardBtn) {
                        leaderboardBtn.style.display = 'block';
                        leaderboardBtn.style.visibility = 'visible';
                    }
                }
                // Playing state - just ensure the controls are visible
                else if (window.gameState === "playing" && window.gameStarted && !window.mobileButtonsShown) {
                    const mobileControls = document.getElementById('mobileControls');
                    if (mobileControls) {
                        mobileControls.style.display = 'block';
                        mobileControls.style.visibility = 'visible';
                        window.mobileButtonsShown = true;
                    }
                    
                    // Make sure the start button stays hidden
                    const startButton = document.getElementById('mobile-canvas-start-button');
                    if (startButton) {
                        startButton.style.display = 'none';
                        startButton.style.visibility = 'hidden';
                    }
                }
            }, 500);
        }
        
        // Simple function to start the game for mobile
        function startGameMobile() {
            if (!isMobileDevice()) return; // Safety check
            if (window.gameStarted) return; // Prevent multiple calls
            
            window.gameStarted = true;
            console.log("Mobile start game clicked");
            
            // 1. Hide the start button immediately and permanently
            const startButton = document.getElementById('mobile-canvas-start-button');
            if (startButton) {
                startButton.style.display = 'none';
                startButton.style.visibility = 'hidden';
            }
            
            // 2. Show the controls
            const mobileControls = document.getElementById('mobileControls');
            if (mobileControls) {
                mobileControls.style.display = 'block';
                mobileControls.style.visibility = 'visible';
                window.mobileButtonsShown = true;
            }
            
            // 3. Try to communicate with game directly via global variables
            if (typeof window.showTitleScreen !== 'undefined') {
                window.showTitleScreen = false;
            }
            if (typeof window.gameState !== 'undefined') {
                window.gameState = "playing";
            }
            
            // 4. Send a single, properly-formed space keydown event
            const spaceKeyEvent = new KeyboardEvent('keydown', {
                bubbles: true,
                cancelable: true,
                keyCode: 32,
                which: 32,
                key: ' ',
                code: 'Space'
            });
            document.dispatchEvent(spaceKeyEvent);
        }
        
        function mobileJump() {
            if (!isMobileDevice()) return; // Safety check
            
            console.log("Mobile jump pressed");
            const jumpEvent = new KeyboardEvent('keydown', {
                bubbles: true,
                cancelable: true,
                keyCode: 32,
                which: 32,
                key: ' ',
                code: 'Space'
            });
            document.dispatchEvent(jumpEvent);
        }
        
        function mobileShoot() {
            if (!isMobileDevice()) return; // Safety check
            
            console.log("Mobile shoot pressed");
            const shootEvent = new KeyboardEvent('keydown', {
                bubbles: true,
                cancelable: true,
                keyCode: 90,
                which: 90,
                key: 'z',
                code: 'KeyZ'
            });
            document.dispatchEvent(shootEvent);
        }
        
        // Simple function to center canvas for mobile
        function centerCanvasForMobile() {
            if (!isMobileDevice()) return; // Safety check
            
            // Check for existing canvas
            const canvas = document.querySelector('canvas');
            if (canvas) {
                // Simple, clean centering
                canvas.style.position = 'absolute';
                canvas.style.top = '50%';
                canvas.style.left = '50%';
                canvas.style.transform = 'translate(-50%, -50%)';
                canvas.style.maxWidth = '100%';
                canvas.style.maxHeight = '100%';
                canvas.style.pointerEvents = 'auto';
            } else {
                // If canvas doesn't exist yet, wait and try again
                setTimeout(centerCanvasForMobile, 100);
            }
        }
        
        // Watch for p5.js initialization and ensure proper setup
        function ensureP5Animation() {
            if (!isMobileDevice()) return false; // Safety check
            
            // Check if the p5 instance is available now
            if (typeof window.p5 !== 'undefined') {
                console.log("p5.js detected, setting up hooks");
                
                // Try to find any p5 instances
                let instances = [];
                
                // Check for the newer p5 instance tracking
                if (window.p5 && window.p5.instances && window.p5.instances.length > 0) {
                    instances = window.p5.instances;
                }
                
                // For older p5 versions or custom implementations
                if (instances.length === 0) {
                    if (window.p5 && typeof window.p5.constructor === 'function') {
                        instances.push(window.p5);
                    }
                }
                
                // If we have any instances, ensure they're running
                if (instances.length > 0) {
                    for (let i = 0; i < instances.length; i++) {
                        const instance = instances[i];
                        if (instance && typeof instance.loop === 'function') {
                            // Force the animation loop to run
                            instance.loop();
                            console.log("Activated p5 instance", i);
                            
                            // Store for later use
                            window.p5Instance = instance;
                        }
                    }
                } else {
                    // Fallback to global p5 functions
                    if (typeof window.loop === 'function') {
                        window.loop();
                        console.log("Activated global p5 loop");
                    }
                }
                
                return true; // Successfully handled p5
            }
            
            // Not available yet, check again after a delay
            setTimeout(ensureP5Animation, 500);
            return false;
        }
        
        // Function to specifically activate the canvas and ensure animations run
        function activateCanvas() {
            if (!isMobileDevice()) return; // Safety check
            
            // Check if the p5 instance exists and is initialized
            if (typeof window.p5 !== 'undefined' && typeof window.loop === 'function') {
                // Ensure the p5 loop is running
                window.loop();
                console.log("Activated p5 animation loop");
            }
            
            // Force any animation frame-based animations to run
            if (typeof window.requestAnimationFrame === 'function') {
                window.requestAnimationFrame(function() {
                    console.log("Forcing animation frame");
                });
            }
            
            // Check for canvas and ensure it's active
            const canvas = document.querySelector('canvas');
            if (canvas) {
                // Make sure the canvas is visible and interactive
                canvas.style.pointerEvents = 'auto';
                canvas.style.visibility = 'visible';
                canvas.style.display = 'block';
                
                // Try to dispatch some events to wake up the canvas
                ['click', 'mousemove', 'touchstart'].forEach(function(eventType) {
                    canvas.dispatchEvent(new Event(eventType, {
                        bubbles: true,
                        cancelable: true
                    }));
                });
                
                // If the canvas has a context, try to trigger a redraw
                if (typeof canvas.getContext === 'function') {
                    const ctx = canvas.getContext('2d');
                    if (ctx && typeof ctx.clearRect === 'function') {
                        ctx.clearRect(0, 0, canvas.width, canvas.height);
                    }
                }
            }
            
            // Schedule another check for canvas activation
            setTimeout(checkCanvasStatus, 500);
        }
        
        // Check if the canvas is actually active and animations are running
        function checkCanvasStatus() {
            if (!isMobileDevice()) return; // Safety check
            
            // Look for signs of animation on the title screen
            if (typeof window.frameCount !== 'undefined') {
                console.log("Frame count detected:", window.frameCount);
                // If frameCount is not advancing, try to restart the loop
                const currentFrame = window.frameCount;
                setTimeout(function() {
                    if (window.frameCount === currentFrame && typeof window.loop === 'function') {
                        window.loop();
                        console.log("Restarted animation loop");
                    }
                }, 500);
            }
        }
        
        // Submit to leaderboard function
        function submitToLeaderboard() {
            if (!isMobileDevice()) return; // Safety check
            
            console.log("Submit to leaderboard");
            // Hide the button to prevent multiple submissions
            const leaderboardBtn = document.getElementById('submitLeaderboardBtn');
            if (leaderboardBtn) {
                leaderboardBtn.style.display = 'none';
            }
            
            // Try the game's function first
            if (typeof window.showLeaderboardForm === 'function') {
                window.showLeaderboardForm();
                return;
            }
            
            // Fallback - create a simple form
            const formContainer = document.createElement('div');
            formContainer.id = 'mobileLeaderboardForm';
            formContainer.style.position = 'fixed';
            formContainer.style.top = '0';
            formContainer.style.left = '0';
            formContainer.style.width = '100%';
            formContainer.style.height = '100%';
            formContainer.style.backgroundColor = 'rgba(0, 0, 0, 0.9)';
            formContainer.style.display = 'flex';
            formContainer.style.justifyContent = 'center';
            formContainer.style.alignItems = 'center';
            formContainer.style.flexDirection = 'column';
            formContainer.style.zIndex = '10000001';
            
            const formTitle = document.createElement('h2');
            formTitle.textContent = 'SUBMIT YOUR SCORE';
            formTitle.style.color = 'white';
            
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.placeholder = 'Enter your name';
            nameInput.style.padding = '10px';
            nameInput.style.margin = '20px';
            
            const submitButton = document.createElement('button');
            submitButton.textContent = 'SUBMIT';
            submitButton.style.padding = '10px 20px';
            
            formContainer.appendChild(formTitle);
            formContainer.appendChild(nameInput);
            formContainer.appendChild(submitButton);
            
            document.body.appendChild(formContainer);
            
            submitButton.addEventListener('click', async function() {
                const playerName = nameInput.value.trim();
                if (!playerName) {
                    alert('Please enter your name');
                    return;
                }
                
                try {
                    if (typeof window.submitScoreToLeaderboard === 'function') {
                        window.submitScoreToLeaderboard(playerName, window.score);
                    } else if (window.supabaseClient) {
                        await window.supabaseClient
                            .from('leaderboard')
                            .insert([{
                                player_name: playerName,
                                score: window.score
                            }]);
                    }
                    
                    formTitle.textContent = 'SCORE SUBMITTED!';
                    formContainer.removeChild(nameInput);
                    formContainer.removeChild(submitButton);
                    
                    const newGameButton = document.createElement('button');
                    newGameButton.textContent = 'PLAY AGAIN';
                    newGameButton.style.padding = '10px 20px';
                    newGameButton.style.margin = '20px';
                    
                    formContainer.appendChild(newGameButton);
                    
                    newGameButton.addEventListener('click', function() {
                        location.reload();
                    });
                } catch (e) {
                    console.error("Error submitting score:", e);
                    alert('Error submitting score');
                }
            });
        }
    </script>
</head>
<body>
    <!-- Mobile START GAME button above canvas - Only visible on mobile -->
    <div id="mobile-canvas-start-button" 
         onclick="startGameMobile()">
        START GAME
    </div>
    
    <!-- Simple mobile start button - HIDDEN -->
    <div id="mobile-start-button" 
         style="display: none; visibility: hidden; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 120px; background-color: rgba(0, 0, 0, 0.8); color: white; font-size: 28px; font-family: 'Arial', sans-serif; text-align: center; line-height: 120px; border-radius: 15px; border: 5px solid #ff3333; z-index: 99999; -webkit-tap-highlight-color: transparent; pointer-events: auto; box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); text-shadow: 0 0 10px #fff; user-select: none;">
         TAP TO START
    </div>
    
    <!-- Game will be rendered by p5.js -->
    
    <!-- Mobile touch controls overlay -->
    <div id="mobileControls" style="display: none; visibility: hidden;">
        <div id="jumpButton" class="mobile-button" 
             onclick="mobileJump()">
            JUMP
        </div>
        <div id="shootButton" class="mobile-button" 
             onclick="mobileShoot()">
            SHOOT
        </div>
    </div>
    
    <!-- Leaderboard submission button for mobile -->
    <div id="submitLeaderboardBtn" onclick="submitToLeaderboard()">SUBMIT SCORE</div>
    
    <!-- Brute force button for mobile submission -->
    <div id="brute-force-mobile-button" onclick="submitToLeaderboard()" style="display: none; position: fixed; bottom: 20%; left: 0; right: 0; margin: 0 auto; width: 200px; height: 60px; background: red; color: white; font-size: 18px; text-align: center; line-height: 60px; border-radius: 10px; border: 3px solid white; z-index: 99999;">SUBMIT SCORE</div>
</body>
</html>
