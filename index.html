<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Happy Birthday Scroller</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="sketch.js"></script>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            touch-action: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            -khtml-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            background-color: #000;
        }
        
        /* Touch controls overlay - only visible on mobile */
        #mobileControls {
            display: none; /* Only shown on mobile */
            position: fixed;
            bottom: 20px;
            left: 0;
            width: 100%;
            padding: 0;
            z-index: 9998;
            pointer-events: none;
        }
        
        /* Individual mobile buttons */
        .mobile-button {
            pointer-events: auto;
            touch-action: manipulation;
            -webkit-tap-highlight-color: transparent;
            border-radius: 50%;
            display: inline-block;
            margin: 0 10px;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.2);
            border: 2px solid rgba(255, 255, 255, 0.5);
            color: white;
            font-weight: bold;
            font-size: 24px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.3);
        }
        
        #jumpButton {
            width: 80px;
            height: 80px;
            line-height: 80px;
            position: fixed;
            left: 40px;
            bottom: 30px;
        }
        
        #shootButton {
            width: 80px;
            height: 80px;
            line-height: 80px;
            position: fixed;
            right: 40px;
            bottom: 30px;
        }
        
        /* Mobile leaderboard submit button - only shows on game over */
        #submitLeaderboardBtn {
            font-family: 'Courier New', monospace;
            font-weight: bold; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            display: none; 
            position: fixed !important; 
            top: 50% !important; 
            left: 50% !important; 
            transform: translate(-50%, -50%) !important; 
            z-index: 999999 !important; 
            width: 300px !important; 
            height: 100px !important; 
            line-height: 100px !important; 
            background-color: rgba(220, 40, 40, 0.95) !important; 
            border: 5px solid rgba(255, 255, 255, 0.95) !important; 
            font-size: 26px !important;
            text-align: center !important;
        }
        
        /* Mobile specific styles */
        @media (max-width: 768px) {
            html, body {
                width: 100%;
                height: 100%;
                padding: 0;
                margin: 0;
                display: flex;
                justify-content: center;
                align-items: center;
                overflow: hidden;
                background-color: #000;
            }
            
            canvas {
                max-width: 100% !important;
                max-height: 100% !important;
                width: auto !important;
                height: auto !important;
                position: absolute !important;
                top: 50% !important;
                left: 50% !important;
                transform: translate(-50%, -50%) !important;
            }
            
            main {
                width: 100% !important;
                height: 100% !important;
                display: flex !important;
                justify-content: center !important;
                align-items: center !important;
                position: relative !important;
            }
        }
    </style>
    
    <script>
        // Make supabase client available globally for the mobile integration
        window.supabaseClient = null;
        
        document.addEventListener('DOMContentLoaded', function() {
            // Initialize Supabase client and store it on window
            const supabaseUrl = 'https://pvpwmikhzzvtcafhtidh.supabase.co';
            const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InB2cHdtaWtoenp2dGNhZmh0aWRoIiwicm9sZSI6ImFub24iLCJpYXQiOjE3MTM1NDA5MDAsImV4cCI6MjAyOTExNjkwMH0.o71bhbTBK_2FHlJYFrELCngtaLWYtFjuXjiN7SuSHW4';
            window.supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);
            
            // Center the canvas for mobile devices
            centerCanvasOnMobile();
            
            // Initialize mobile checks
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                (window.matchMedia && window.matchMedia("(max-width: 768px)").matches) ||
                ('ontouchstart' in window) ||
                (navigator.maxTouchPoints > 0);
                
            // If on mobile, show the start button (controls will be shown during gameplay)
            if (isMobile) {
                setTimeout(function() {
                    const startBtn = document.getElementById('mobile-start-button');
                    if (startBtn && (window.showTitleScreen === true || window.gameState === "titleScreen")) {
                        startBtn.style.display = 'block';
                    }
                }, 500);
            }
        });
        
        // Functions exposed to window for mobile integration
        window.showLeaderboardForm = function() {
            if (typeof showLeaderboardForm === 'function') {
                showLeaderboardForm();
            }
        };
        
        window.hideLeaderboardForm = function() {
            if (typeof hideLeaderboardForm === 'function') {
                hideLeaderboardForm();
            }
        };
        
        window.submitScoreToLeaderboard = function(playerName, score) {
            if (typeof submitScoreToLeaderboard === 'function') {
                submitScoreToLeaderboard(playerName, score);
            }
        };
        
        // Mobile control functions
        function mobileJump() {
            // Use keyCode 32 (spacebar) for jump
            const e = new KeyboardEvent('keydown', { 
                'keyCode': 32,
                'key': ' ',
                'code': 'Space',
                'which': 32,
                'bubbles': true
            });
            document.dispatchEvent(e);
            console.log("Mobile jump event fired");
            
            // Hide start button if on title screen
            if (window.showTitleScreen) {
                const startBtn = document.getElementById('mobile-start-button');
                if (startBtn) startBtn.style.display = 'none';
            }
        }
        
        function mobileShoot() {
            // Use keyCode 90 (Z key) for shooting
            const e = new KeyboardEvent('keydown', { 
                'keyCode': 90,
                'key': 'z',
                'code': 'KeyZ', 
                'which': 90,
                'bubbles': true
            });
            document.dispatchEvent(e);
            console.log("Mobile shoot event fired");
            
            // Hide start button if on title screen
            if (window.showTitleScreen) {
                const startBtn = document.getElementById('mobile-start-button');
                if (startBtn) startBtn.style.display = 'none';
            }
        }
        
        // Simple function to start the game for mobile
        function startGameMobile() {
            console.log("Mobile start game clicked");
            
            // Hide the mobile start button
            const mobileStartButton = document.getElementById('mobile-start-button');
            if (mobileStartButton) {
                mobileStartButton.style.display = 'none';
            }
            
            // Create and dispatch a spacebar keydown event to start the game
            try {
                // This will create a properly formed keyboard event that works across browsers
                const spaceEvent = new KeyboardEvent('keydown', {
                    key: ' ',
                    code: 'Space',
                    keyCode: 32,
                    which: 32,
                    bubbles: true
                });
                document.dispatchEvent(spaceEvent);
                console.log("Space keydown event dispatched to start game");
                
                // For iOS/Safari which can sometimes be picky about simulated events
                // Create a fallback method to directly set the game state variables if accessible
                setTimeout(function() {
                    console.log("Checking if fallback method needed");
                    if (window.showTitleScreen === true) {
                        console.log("Using fallback method to start game");
                        window.showTitleScreen = false;
                        if (typeof window.gameState !== 'undefined') {
                            window.gameState = "playing";
                        }
                    }
                }, 300);
            } catch (e) {
                console.error("Error dispatching spacebar event:", e);
            }
            
            return false; // Prevent default action
        }
        
        // Submit to leaderboard function for mobile
        function submitToLeaderboard() {
            console.log("Mobile submit to leaderboard button clicked");
            
            // Hide the submit button to prevent multiple submissions
            const leaderboardBtn = document.getElementById('submitLeaderboardBtn');
            if (leaderboardBtn) {
                leaderboardBtn.style.display = 'none';
            }
            
            // Hide the brute force button too
            const bruteForceButton = document.getElementById('brute-force-mobile-button');
            if (bruteForceButton) {
                bruteForceButton.style.display = 'none';
            }
            
            // First try using the game's native function if available
            if (typeof window.showLeaderboardForm === 'function') {
                console.log("Using game's native showLeaderboardForm");
                window.showLeaderboardForm();
                return;
            }
            
            // If native function not available, create a simple form
            console.log("Creating mobile submission form");
            
            const formContainer = document.createElement('div');
            formContainer.id = 'mobileLeaderboardForm';
            formContainer.style.position = 'fixed';
            formContainer.style.top = '0';
            formContainer.style.left = '0';
            formContainer.style.width = '100%';
            formContainer.style.height = '100%';
            formContainer.style.backgroundColor = 'rgba(0, 0, 0, 0.9)';
            formContainer.style.display = 'flex';
            formContainer.style.justifyContent = 'center';
            formContainer.style.alignItems = 'center';
            formContainer.style.flexDirection = 'column';
            formContainer.style.zIndex = '10000001';
            formContainer.style.fontFamily = 'Arial, sans-serif';
            
            const formTitle = document.createElement('h2');
            formTitle.textContent = 'SUBMIT YOUR SCORE';
            formTitle.style.color = 'white';
            formTitle.style.marginBottom = '20px';
            formTitle.style.fontSize = '24px';
            
            const scoreDisplay = document.createElement('div');
            scoreDisplay.textContent = 'Score: ' + window.score;
            scoreDisplay.style.color = 'white';
            scoreDisplay.style.fontSize = '20px';
            scoreDisplay.style.marginBottom = '20px';
            
            const nameInput = document.createElement('input');
            nameInput.type = 'text';
            nameInput.placeholder = 'Enter your name';
            nameInput.style.padding = '10px';
            nameInput.style.fontSize = '18px';
            nameInput.style.marginBottom = '20px';
            nameInput.style.width = '80%';
            nameInput.style.maxWidth = '300px';
            nameInput.style.borderRadius = '5px';
            nameInput.style.border = 'none';
            
            const submitButton = document.createElement('button');
            submitButton.textContent = 'SUBMIT';
            submitButton.style.padding = '15px 30px';
            submitButton.style.fontSize = '20px';
            submitButton.style.backgroundColor = '#ff3333';
            submitButton.style.color = 'white';
            submitButton.style.border = 'none';
            submitButton.style.borderRadius = '5px';
            submitButton.style.cursor = 'pointer';
            
            formContainer.appendChild(formTitle);
            formContainer.appendChild(scoreDisplay);
            formContainer.appendChild(nameInput);
            formContainer.appendChild(submitButton);
            
            document.body.appendChild(formContainer);
            
            // Focus the name input for mobile keyboards
            setTimeout(() => nameInput.focus(), 300);
            
            // Submit button handler
            submitButton.addEventListener('click', async function() {
                const playerName = nameInput.value.trim();
                if (!playerName) {
                    alert('Please enter your name');
                    return;
                }
                
                try {
                    console.log("Submitting score:", playerName, window.score);
                    
                    // Try using the game's function first
                    if (typeof window.submitScoreToLeaderboard === 'function') {
                        window.submitScoreToLeaderboard(playerName, window.score);
                    } 
                    // Otherwise use Supabase directly
                    else if (window.supabaseClient) {
                        const { data, error } = await window.supabaseClient
                            .from('leaderboard')
                            .insert([{
                                player_name: playerName,
                                score: window.score
                            }]);
                            
                        if (error) {
                            console.error("Supabase error:", error);
                            alert('Error submitting score: ' + error.message);
                            return;
                        }
                    } else {
                        alert('Error: Could not connect to leaderboard');
                        return;
                    }
                    
                    // Show success message
                    formTitle.textContent = 'SCORE SUBMITTED!';
                    formContainer.removeChild(nameInput);
                    formContainer.removeChild(submitButton);
                    
                    const newGameButton = document.createElement('button');
                    newGameButton.textContent = 'PLAY AGAIN';
                    newGameButton.style.padding = '15px 30px';
                    newGameButton.style.fontSize = '20px';
                    newGameButton.style.backgroundColor = '#4CAF50';
                    newGameButton.style.color = 'white';
                    newGameButton.style.border = 'none';
                    newGameButton.style.borderRadius = '5px';
                    newGameButton.style.cursor = 'pointer';
                    newGameButton.style.marginTop = '20px';
                    
                    formContainer.appendChild(newGameButton);
                    
                    newGameButton.addEventListener('click', function() {
                        formContainer.remove();
                        location.reload();
                    });
                } catch (e) {
                    console.error("Error submitting score:", e);
                    alert('Error submitting score. Please try again.');
                }
            });
        }
        
        // Check game state and show buttons accordingly - simple version
        setInterval(function() {
            try {
                // Game over state - show submission buttons
                if (window.gameState === "gameOver") {
                    // Show submission buttons
                    const leaderboardBtn = document.getElementById('submitLeaderboardBtn');
                    if (leaderboardBtn) {
                        leaderboardBtn.style.display = 'block';
                    }
                    
                    const bruteForceButton = document.getElementById('brute-force-mobile-button');
                    if (bruteForceButton) {
                        bruteForceButton.style.display = 'block';
                    }
                    
                    // Hide start button and controls
                    const startBtn = document.getElementById('mobile-start-button');
                    if (startBtn) {
                        startBtn.style.display = 'none';
                    }
                    
                    const mobileControls = document.getElementById('mobileControls');
                    if (mobileControls) {
                        mobileControls.style.display = 'none';
                    }
                }
                
                // Title screen - show start button, hide controls
                if ((window.showTitleScreen === true || window.gameState === "titleScreen") && window.gameState !== "playing") {
                    const startBtn = document.getElementById('mobile-start-button');
                    if (startBtn) {
                        startBtn.style.display = 'block';
                    }
                    
                    const mobileControls = document.getElementById('mobileControls');
                    if (mobileControls) {
                        mobileControls.style.display = 'none';
                    }
                }
                
                // Playing state - hide start button, show controls
                if (window.gameState === "playing") {
                    const startBtn = document.getElementById('mobile-start-button');
                    if (startBtn) {
                        startBtn.style.display = 'none';
                    }
                    
                    const mobileControls = document.getElementById('mobileControls');
                    if (mobileControls) {
                        mobileControls.style.display = 'block';
                    }
                }
            } catch (e) {
                console.error("Error in game state monitor:", e);
            }
        }, 500);
        
        // Function to center the canvas on mobile devices
        function centerCanvasOnMobile() {
            // Wait for the canvas to be created
            const observer = new MutationObserver(function(mutations) {
                mutations.forEach(function(mutation) {
                    if (mutation.addedNodes) {
                        mutation.addedNodes.forEach(function(node) {
                            if (node.nodeName === 'CANVAS') {
                                console.log("Canvas detected - centering for mobile");
                                
                                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                                    (window.matchMedia && window.matchMedia("(max-width: 768px)").matches) ||
                                    ('ontouchstart' in window) ||
                                    (navigator.maxTouchPoints > 0);
                                
                                if (isMobile) {
                                    // Center canvas absolutely in the viewport
                                    node.style.position = 'absolute';
                                    node.style.top = '50%';
                                    node.style.left = '50%';
                                    node.style.transform = 'translate(-50%, -50%)';
                                    node.style.maxWidth = '100%';
                                    node.style.maxHeight = '100%';
                                    
                                    // Create a container for the canvas if none exists
                                    if (!node.parentNode || node.parentNode === document.body) {
                                        const container = document.createElement('div');
                                        container.style.position = 'fixed';
                                        container.style.top = '0';
                                        container.style.left = '0';
                                        container.style.width = '100%';
                                        container.style.height = '100%';
                                        container.style.display = 'flex';
                                        container.style.justifyContent = 'center';
                                        container.style.alignItems = 'center';
                                        container.style.zIndex = '1';
                                        
                                        // Replace the canvas with the container
                                        if (node.parentNode) {
                                            node.parentNode.replaceChild(container, node);
                                        }
                                        
                                        // Add the canvas to the container
                                        container.appendChild(node);
                                    }
                                    
                                    console.log("Mobile canvas positioning applied - centered in viewport");
                                }
                                
                                // Disconnect after finding canvas
                                observer.disconnect();
                            }
                        });
                    }
                });
            });
            
            // Observe for canvas creation
            observer.observe(document.body, { childList: true, subtree: true });
            
            // Also try immediately in case canvas already exists
            const canvas = document.querySelector('canvas');
            if (canvas) {
                console.log("Canvas already exists - applying mobile positioning");
                
                const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || 
                    (window.matchMedia && window.matchMedia("(max-width: 768px)").matches) ||
                    ('ontouchstart' in window) ||
                    (navigator.maxTouchPoints > 0);
                
                if (isMobile) {
                    // Center canvas absolutely in the viewport
                    canvas.style.position = 'absolute';
                    canvas.style.top = '50%';
                    canvas.style.left = '50%';
                    canvas.style.transform = 'translate(-50%, -50%)';
                    canvas.style.maxWidth = '100%';
                    canvas.style.maxHeight = '100%';
                    
                    // Create a container for the canvas if none exists
                    if (!canvas.parentNode || canvas.parentNode === document.body) {
                        const container = document.createElement('div');
                        container.style.position = 'fixed';
                        container.style.top = '0';
                        container.style.left = '0';
                        container.style.width = '100%';
                        container.style.height = '100%';
                        container.style.display = 'flex';
                        container.style.justifyContent = 'center';
                        container.style.alignItems = 'center';
                        container.style.zIndex = '1';
                        
                        // Replace the canvas with the container
                        if (canvas.parentNode) {
                            canvas.parentNode.replaceChild(container, canvas);
                        }
                        
                        // Add the canvas to the container
                        container.appendChild(canvas);
                    }
                }
            }
        }
    </script>
</head>
<body>
    <!-- Simple mobile start button, completely separate from the game's original controls -->
    <div id="mobile-start-button" 
         style="display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 280px; height: 120px; background-color: rgba(0, 0, 0, 0.8); color: white; font-size: 28px; font-family: 'Arial', sans-serif; text-align: center; line-height: 120px; border-radius: 15px; border: 5px solid #ff3333; z-index: 99999; -webkit-tap-highlight-color: transparent; pointer-events: auto; box-shadow: 0 0 30px rgba(255, 0, 0, 0.5); text-shadow: 0 0 10px #fff;"
         onclick="startGameMobile(); return false;" 
         ontouchstart="startGameMobile(); event.preventDefault(); event.stopPropagation(); return false;">
         TAP TO START
    </div>
    
    <!-- Game will be rendered by p5.js -->
    
    <!-- Mobile touch controls overlay -->
    <div id="mobileControls">
        <div id="jumpButton" class="mobile-button" 
             onclick="mobileJump(); if(window.showTitleScreen === true) startGameMobile();" 
             ontouchstart="mobileJump(); if(window.showTitleScreen === true) startGameMobile(); event.preventDefault();">
            JUMP
        </div>
        <div id="shootButton" class="mobile-button" 
             onclick="mobileShoot(); if(window.showTitleScreen === true) startGameMobile();" 
             ontouchstart="mobileShoot(); if(window.showTitleScreen === true) startGameMobile(); event.preventDefault();">
            SHOOT
        </div>
    </div>
    
    <!-- Leaderboard submission button for mobile -->
    <div id="submitLeaderboardBtn" onclick="submitToLeaderboard()">SUBMIT SCORE</div>
    
    <!-- Brute force button for mobile submission -->
    <div id="brute-force-mobile-button" onclick="submitToLeaderboard()" style="display: none; position: fixed; bottom: 20%; left: 0; right: 0; margin: 0 auto; width: 200px; height: 60px; background: red; color: white; font-size: 18px; text-align: center; line-height: 60px; border-radius: 10px; border: 3px solid white; z-index: 99999;">SUBMIT SCORE</div>
</body>
</html>
